<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Javi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-name">Javi</span>
        <span class="status">
          <span class="status-dot" id="statusDot"></span>
          <span id="stateLabel">En reposo</span>
        </span>
      </div>
      <div class="swatches" id="swatches"></div>
    </header>

    <main class="stage">
      <div class="orb" id="orb"></div>
      <div class="caption flash" id="caption">Aquí estoy cuando me necesites</div>
    </main>

    <footer class="dock" id="dock">
      <!-- Collapsible panel: states + text input. Slides up when revealed. -->
      <div class="dock-panel" id="dockPanel">
        <div class="dock-panel-inner">
          <div class="segmented" id="segmented"></div>
          <div class="inputbar">
            <input id="input" type="text" placeholder="Habla o escribe a Javi…" autocomplete="off" />
            <button class="icon-btn send" id="sendBtn" title="Enviar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5" />
                <polyline points="6 11 12 5 18 11" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Always-visible bar: mic to interact + arrow to reveal the panel. -->
      <div class="dock-bar">
        <button class="icon-btn mic" id="micBtn" title="Hablar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3" />
            <path d="M5 11a7 7 0 0 0 14 0" />
            <line x1="12" y1="18" x2="12" y2="22" />
          </svg>
        </button>
        <button class="icon-btn reveal" id="revealBtn" title="Mostrar controles" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 15 12 9 18 15" />
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
