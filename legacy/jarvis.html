<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<style>
  :root {
    --bg: #04070d;
    --bg-glow: #0a1420;
    --core: #aef3ff;
    --ring-1: #2fd4ff;
    --ring-2: #1789d6;
    --ring-3: #0d4a7a;
    --accent: #38e0ff;
    --warn: #ff9d4d;
    --text-dim: #5d7a92;
    --text: #bfe6f7;
    --mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: radial-gradient(ellipse at 50% 40%, var(--bg-glow) 0%, var(--bg) 60%);
    color: var(--text);
    font-family: var(--mono);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 920px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ---- Top HUD bar ---- */
  .hud-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .hud-top .brand {
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.4em;
  }
  .hud-top .brand b { color: var(--core); }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim);
    box-shadow: 0 0 8px currentColor;
    transition: background .3s, color .3s;
  }
  .status-dot.online { background: var(--ring-1); color: var(--ring-1); }
  .status-dot.error  { background: var(--warn);  color: var(--warn); }

  /* ---- Center stage ---- */
  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  #orb {
    width: min(62vh, 460px);
    height: min(62vh, 460px);
    display: block;
  }
  .state-label {
    font-size: 12px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--text-dim);
    height: 14px;
    transition: color .3s;
  }
  .state-label.active { color: var(--accent); }

  .transcript {
    position: absolute;
    bottom: -4px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    min-height: 48px;
    padding: 0 12px;
    opacity: .92;
  }
  .transcript .you { color: var(--text-dim); font-size: 12px; letter-spacing: .1em; }

  /* ---- Bottom controls ---- */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .field {
    flex: 1;
    display: flex;
    align-items: center;
    background: rgba(20, 40, 60, 0.4);
    border: 1px solid rgba(56, 224, 255, 0.18);
    border-radius: 2px;
    padding: 0 4px 0 16px;
    transition: border-color .25s, box-shadow .25s;
  }
  .field:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 24px rgba(56,224,255,.15);
  }
  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 16px 8px;
    letter-spacing: .02em;
  }
  #input::placeholder { color: var(--text-dim); }

  button {
    background: none;
    border: 1px solid rgba(56, 224, 255, 0.25);
    color: var(--accent);
    font-family: var(--mono);
    cursor: pointer;
    border-radius: 2px;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  button:hover { border-color: var(--accent); background: rgba(56,224,255,.08); }
  button:active { transform: scale(.96); }
  button:disabled { opacity: .35; cursor: not-allowed; }

  .icon-btn { width: 52px; height: 52px; flex-shrink: 0; }
  .icon-btn svg { width: 22px; height: 22px; }

  #micBtn.recording {
    border-color: var(--warn);
    color: var(--warn);
    animation: micpulse 1.2s ease-in-out infinite;
  }
  @keyframes micpulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,157,77,.4); }
    50%     { box-shadow: 0 0 0 8px rgba(255,157,77,0); }
  }

  .send-btn { padding: 0 22px; height: 44px; margin: 4px; font-size: 12px; letter-spacing: .2em; }

  /* settings row */
  .settings {
    display: flex;
    gap: 18px;
    align-items: center;
    margin-top: 12px;
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--text-dim);
    text-transform: uppercase;
    flex-wrap: wrap;
  }
  .settings label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .settings select, .settings input[type=text] {
    background: rgba(20,40,60,.4);
    border: 1px solid rgba(56,224,255,.18);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 2px;
    outline: none;
  }
  .settings input[type=checkbox] { accent-color: var(--accent); }
  .toggle-settings { color: var(--text-dim); cursor: pointer; user-select: none; }
  .toggle-settings:hover { color: var(--accent); }
  .settings.hidden { display: none; }

  @media (max-width: 540px) {
    #orb { width: 78vw; height: 78vw; }
    .send-btn span { display: none; }
  }
</style>
</head>
<body>
<div id="app">

  <div class="hud-top">
    <div class="brand">J <b>A</b> R V I S</div>
    <div class="status-pill">
      <span id="statusText">CONECTANDO…</span>
      <span class="status-dot" id="statusDot"></span>
    </div>
  </div>

  <div class="stage">
    <canvas id="orb"></canvas>
    <div class="state-label" id="stateLabel">EN REPOSO</div>
    <div class="transcript" id="transcript"></div>
  </div>

  <div>
    <div class="controls">
      <button class="icon-btn" id="micBtn" title="Hablar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
      </button>
      <div class="field">
        <input id="input" type="text" placeholder="Escribe o pulsa el micrófono…" autocomplete="off" />
        <button class="send-btn" id="sendBtn">ENVIAR</button>
      </div>
    </div>

    <div class="settings hidden" id="settings">
      <label>Modelo
        <select id="modelSel"><option value="gemma3:12b">gemma3:12b</option></select>
      </label>
      <label>Voz
        <select id="voiceSel"></select>
      </label>
      <label><input type="checkbox" id="ttsToggle" checked> Voz activada</label>
      <label>Ollama
        <input type="text" id="hostInput" value="http://localhost:11434" size="22">
      </label>
    </div>
    <div style="text-align:center;margin-top:10px">
      <span class="toggle-settings" id="toggleSettings">⚙ ajustes</span>
    </div>
  </div>

</div>

<script>
/* ============================================================
   JARVIS — local voice interface
   STT: webkitSpeechRecognition | TTS: speechSynthesis
   Brain: Ollama /api/chat (streaming)
   ============================================================ */

const $ = id => document.getElementById(id);
const input = $('input'), micBtn = $('micBtn'), sendBtn = $('sendBtn');
const stateLabel = $('stateLabel'), transcript = $('transcript');
const statusText = $('statusText'), statusDot = $('statusDot');
const modelSel = $('modelSel'), voiceSel = $('voiceSel'), ttsToggle = $('ttsToggle'), hostInput = $('hostInput');

let HOST = hostInput.value;
hostInput.addEventListener('change', () => { HOST = hostInput.value.replace(/\/$/,''); checkOllama(); loadModels(); });

const SYSTEM_PROMPT =
  "Eres JARVIS, un asistente personal local. Respondes en el idioma del usuario (español o inglés). " +
  "Eres conciso, cálido y directo: respuestas para ser escuchadas en voz alta, no leídas, así que evita listas largas, " +
  "markdown y símbolos. Frases cortas y naturales. Si no sabes algo con certeza, dilo. " +
  "Vives en la máquina del usuario en Lima, Perú.";

let history = [{ role: 'system', content: SYSTEM_PROMPT }];

/* ---------------- State machine ---------------- */
const State = { IDLE:'idle', LISTENING:'listening', THINKING:'thinking', SPEAKING:'speaking' };
let state = State.IDLE;
const LABELS = { idle:'EN REPOSO', listening:'ESCUCHANDO', thinking:'PROCESANDO', speaking:'RESPONDIENDO' };
function setState(s){
  state = s;
  stateLabel.textContent = LABELS[s];
  stateLabel.classList.toggle('active', s !== State.IDLE);
}

/* ============================================================
   ORB  — canvas, concentric reactive rings + particle field
   amplitude (0..1) drives expansion. Real mic FFT when listening;
   word-boundary pulses when speaking.
   ============================================================ */
const canvas = $('orb'), ctx = canvas.getContext('2d');
let DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H, CX, CY, R;
function resize(){
  const size = canvas.clientWidth;
  canvas.width = size * DPR; canvas.height = size * DPR;
  W = canvas.width; H = canvas.height; CX = W/2; CY = H/2; R = Math.min(W,H)*0.30;
}
new ResizeObserver(resize).observe(canvas);

let amp = 0;          // smoothed amplitude 0..1
let ampTarget = 0;
let pulse = 0;        // decaying pulse for word boundaries
const particles = Array.from({length: 90}, () => ({
  a: Math.random()*Math.PI*2,
  r: 0.8 + Math.random()*0.6,
  spd: 0.0006 + Math.random()*0.0014,
  size: 0.6 + Math.random()*1.8
}));

function hex(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

let t = 0;
function draw(){
  t += 1;
  // ease amplitude toward target; add decaying pulse
  amp += (ampTarget - amp) * 0.12;
  pulse *= 0.90;
  const energy = Math.min(1, amp + pulse);

  ctx.clearRect(0,0,W,H);
  ctx.globalCompositeOperation = 'lighter';

  const cCore = hex('--core'), c1 = hex('--ring-1'), c2 = hex('--ring-2'), c3 = hex('--ring-3');
  const stateColor = state===State.LISTENING ? hex('--warn')
                    : state===State.THINKING ? c1 : c1;

  // ---- core glow ----
  const coreR = R * (0.30 + energy*0.10);
  const g = ctx.createRadialGradient(CX,CY,0, CX,CY, coreR*2.4);
  g.addColorStop(0, cCore);
  g.addColorStop(0.25, c1);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.55 + energy*0.4;
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(CX,CY, coreR*2.4, 0, Math.PI*2); ctx.fill();

  // ---- concentric rotating rings ----
  ctx.globalAlpha = 1;
  const rings = [
    { rad: R*0.55, w: 2.0, col: c1, rot:  t*0.004, gap: 0.16, react: 1.0 },
    { rad: R*0.78, w: 1.4, col: c2, rot: -t*0.0026, gap: 0.30, react: 0.6 },
    { rad: R*1.02, w: 1.0, col: c3, rot:  t*0.0016, gap: 0.50, react: 0.35 },
  ];
  for(const ring of rings){
    const rr = ring.rad * (1 + energy*0.12*ring.react);
    ctx.strokeStyle = ring.col;
    ctx.lineWidth = ring.w * DPR;
    ctx.shadowBlur = 14*DPR; ctx.shadowColor = ring.col;
    // dashed arc segments
    const segs = 36;
    for(let i=0;i<segs;i++){
      const a0 = ring.rot + (i/segs)*Math.PI*2;
      const a1 = a0 + (1-ring.gap)*(Math.PI*2/segs);
      ctx.globalAlpha = 0.25 + 0.6*energy*ring.react + 0.15;
      ctx.beginPath(); ctx.arc(CX,CY, rr, a0, a1); ctx.stroke();
    }
  }
  ctx.shadowBlur = 0;

  // ---- reactive inner ring (responds strongest) ----
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = stateColor;
  ctx.lineWidth = 2.5*DPR;
  ctx.shadowBlur = 20*DPR; ctx.shadowColor = stateColor;
  ctx.beginPath();
  const pts = 120;
  for(let i=0;i<=pts;i++){
    const a = (i/pts)*Math.PI*2;
    const wobble = Math.sin(a*6 + t*0.05)*energy*0.06 + Math.sin(a*11 - t*0.03)*energy*0.04;
    const rr = R*0.42*(1 + wobble + energy*0.18);
    const x = CX + Math.cos(a)*rr, y = CY + Math.sin(a)*rr;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // ---- particle field ----
  for(const p of particles){
    p.a += p.spd * (1 + energy*3);
    const rr = R*(p.r + energy*0.25);
    const x = CX + Math.cos(p.a)*rr;
    const y = CY + Math.sin(p.a)*rr;
    ctx.globalAlpha = 0.15 + energy*0.6;
    ctx.fillStyle = c1;
    ctx.beginPath(); ctx.arc(x,y, p.size*DPR*(0.6+energy), 0, Math.PI*2); ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  requestAnimationFrame(draw);
}
resize(); draw();

/* idle breathing when nothing happening */
setInterval(() => {
  if(state === State.IDLE) ampTarget = 0.08 + Math.sin(Date.now()/900)*0.05;
}, 60);

/* ============================================================
   MIC INPUT — real audio reactivity via Web Audio AnalyserNode
   ============================================================ */
let audioCtx, analyser, micStream, micData, micRAF;
async function startMicMeter(){
  try{
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    micData = new Uint8Array(analyser.frequencyBinCount);
    const loop = () => {
      analyser.getByteFrequencyData(micData);
      let sum=0; for(const v of micData) sum+=v;
      ampTarget = Math.min(1, (sum/micData.length)/110);
      micRAF = requestAnimationFrame(loop);
    };
    loop();
  }catch(e){ console.warn('mic meter unavailable', e); }
}
function stopMicMeter(){
  cancelAnimationFrame(micRAF);
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  ampTarget = 0;
}

/* ============================================================
   STT — webkitSpeechRecognition
   ============================================================ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, recording = false;
if(SR){
  recog = new SR();
  recog.lang = 'es-PE';
  recog.interimResults = true;
  recog.continuous = false;

  recog.onstart = () => { recording = true; micBtn.classList.add('recording'); setState(State.LISTENING); startMicMeter(); };
  recog.onresult = (e) => {
    let txt = '';
    for(let i=e.resultIndex;i<e.results.length;i++) txt += e.results[i][0].transcript;
    input.value = txt;
    transcript.innerHTML = `<span class="you">TÚ</span> ${txt}`;
  };
  recog.onerror = (e) => { console.warn('STT error', e.error); };
  recog.onend = () => {
    recording = false; micBtn.classList.remove('recording'); stopMicMeter();
    const txt = input.value.trim();
    if(txt){ send(txt); } else { setState(State.IDLE); }
  };
} else {
  micBtn.disabled = true;
  micBtn.title = 'Tu navegador no soporta reconocimiento de voz (usa Chrome)';
}

micBtn.addEventListener('click', () => {
  if(!recog) return;
  if(recording){ recog.stop(); }
  else { input.value=''; transcript.innerHTML=''; try{ recog.start(); }catch(e){} }
});

/* ============================================================
   TTS — speechSynthesis (word-boundary pulses drive the orb)
   ============================================================ */
let voices = [], chosenVoice = null;
function loadVoices(){
  voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('es') || v.lang.startsWith('en'));
  voiceSel.innerHTML = '';
  voices.forEach((v,i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = `${v.name} (${v.lang})`;
    voiceSel.appendChild(o);
  });
  // prefer a Spanish voice
  const esIdx = voices.findIndex(v => v.lang.startsWith('es'));
  if(esIdx >= 0){ voiceSel.value = esIdx; chosenVoice = voices[esIdx]; }
  else if(voices.length){ chosenVoice = voices[0]; }
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
voiceSel.addEventListener('change', () => { chosenVoice = voices[voiceSel.value]; });

/* ============================================================
   BRAIN — Ollama /api/chat with streaming
   ============================================================ */
async function checkOllama(){
  try{
    const r = await fetch(`${HOST}/api/tags`);
    if(!r.ok) throw 0;
    statusText.textContent = 'EN LÍNEA';
    statusDot.className = 'status-dot online';
    return true;
  }catch(e){
    statusText.textContent = 'SIN CONEXIÓN';
    statusDot.className = 'status-dot error';
    return false;
  }
}
async function loadModels(){
  try{
    const r = await fetch(`${HOST}/api/tags`);
    const data = await r.json();
    if(data.models && data.models.length){
      modelSel.innerHTML = '';
      data.models.forEach(m => {
        const o = document.createElement('option');
        o.value = m.name; o.textContent = m.name;
        modelSel.appendChild(o);
      });
      const g = [...modelSel.options].find(o => o.value.includes('gemma'));
      if(g) modelSel.value = g.value;
    }
  }catch(e){}
}

async function send(text){
  text = (text||'').trim();
  if(!text) return;
  input.value = '';
  transcript.innerHTML = `<span class="you">TÚ</span> ${text}`;
  history.push({ role:'user', content:text });
  setState(State.THINKING);
  ampTarget = 0.3;

  let reply = '';
  let spokenUpTo = 0;       // for sentence-by-sentence speaking
  try{
    const res = await fetch(`${HOST}/api/chat`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model: modelSel.value, messages: history, stream: true })
    });
    if(!res.ok) throw new Error('HTTP '+res.status);

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buf += dec.decode(value, { stream:true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for(const line of lines){
        if(!line.trim()) continue;
        const j = JSON.parse(line);
        if(j.message && j.message.content){
          reply += j.message.content;
          transcript.innerHTML = `<span class="you">TÚ</span> ${text}<br><br>${reply}`;
          // speak complete sentences as they arrive (lower latency)
          const m = reply.slice(spokenUpTo).match(/[^.!?…]+[.!?…]+/);
          if(m){
            const sentence = m[0];
            spokenUpTo += m.index + sentence.length;
            speakQueue(sentence);
          }
        }
      }
    }
    // speak any remainder
    const rest = reply.slice(spokenUpTo).trim();
    if(rest) speakQueue(rest);
    history.push({ role:'assistant', content: reply });
  }catch(e){
    const msg = 'No puedo conectar con el modelo. Revisa que Ollama esté corriendo y que OLLAMA_ORIGINS permita este origen.';
    transcript.innerHTML = `<span class="you">SISTEMA</span> ${msg}`;
    statusText.textContent = 'ERROR'; statusDot.className='status-dot error';
    setState(State.IDLE);
  }
}

/* simple TTS queue so streamed sentences don't overlap */
let ttsQueue = [], ttsBusy = false;
function speakQueue(sentence){
  if(!ttsToggle.checked) return;
  ttsQueue.push(sentence.trim());
  if(!ttsBusy) drainQueue();
}
function drainQueue(){
  if(!ttsQueue.length){ ttsBusy=false; if(state===State.SPEAKING) setState(State.IDLE); return; }
  ttsBusy = true;
  const s = ttsQueue.shift();
  const u = new SpeechSynthesisUtterance(s);
  if(chosenVoice) u.voice = chosenVoice;
  u.lang = chosenVoice ? chosenVoice.lang : 'es-ES';
  u.rate = 1.04;
  u.onstart = () => setState(State.SPEAKING);
  u.onboundary = () => { pulse = 0.9; ampTarget = 0.5; };
  u.onend = () => { ampTarget = 0; drainQueue(); };
  speechSynthesis.speak(u);
}

/* ---------------- wire up ---------------- */
sendBtn.addEventListener('click', () => send(input.value));
input.addEventListener('keydown', e => { if(e.key==='Enter') send(input.value); });
$('toggleSettings').addEventListener('click', () => $('settings').classList.toggle('hidden'));

/* boot */
(async () => {
  const ok = await checkOllama();
  if(ok) await loadModels();
  setInterval(checkOllama, 15000);
})();
</script>
</body>
</html>
